name: iOS — Deploy to App Store

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ios/**'
      - '.github/workflows/ios-deploy.yml'

jobs:
  deploy:
    name: Build & Submit to App Store
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler: 'latest'
          working-directory: ios

      - name: Install Fastlane
        working-directory: ios
        run: bundle install

      - name: Patch Fastlane compatibility
        working-directory: ios
        run: |
          FASTLANE_DIR=$(bundle exec ruby -e "puts Gem::Specification.find_by_name('fastlane').gem_dir")

          # Fix OpenSSL 3.x "invalid curve name" bug
          TOKEN_RB="$FASTLANE_DIR/spaceship/lib/spaceship/connect_api/token.rb"
          sed -i '' 's/OpenSSL::PKey::EC\.new/OpenSSL::PKey.read/g' "$TOKEN_RB"
          echo "Patched $TOKEN_RB"

          # Fix "No data" crash when fetching review detail on first submission
          # Step 1: patch model.rb so fetch_app_store_review_detail returns nil instead of raising
          MODEL_RB="$FASTLANE_DIR/spaceship/lib/spaceship/connect_api/model.rb"
          ruby -e "
            path = '$MODEL_RB'
            content = File.read(path)
            content.gsub!('raise \"No data\"', 'return nil')
            File.write(path, content)
          "
          echo "Patched $MODEL_RB"

          # Step 2: patch upload_metadata.rb to use safe navigator so nil review detail doesn't crash
          METADATA_RB="$FASTLANE_DIR/deliver/lib/deliver/upload_metadata.rb"
          ruby -e "
            path = '$METADATA_RB'
            content = File.read(path)
            content.gsub!(
              'app_store_review_detail.app_store_review_attachments',
              'app_store_review_detail&.app_store_review_attachments'
            )
            File.write(path, content)
          "
          echo "Patched $METADATA_RB"

      - name: Write App Store Connect API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/asc-keys
          echo "$ASC_API_KEY_CONTENT" | base64 --decode > ~/asc-keys/AuthKey_3349GWYVGR.p8

      - name: Prepare ASC version for submission
        working-directory: ios
        run: |
          bundle exec ruby << 'RUBY'
          require 'spaceship'

          key = Spaceship::ConnectAPI::Token.create(
            key_id: "3349GWYVGR",
            issuer_id: "220f0894-51a2-449c-ad61-9715441b4a11",
            key_filepath: File.join(Dir.home, "asc-keys/AuthKey_3349GWYVGR.p8"),
            duration: 1200,
            in_house: false
          )
          Spaceship::ConnectAPI.token = key

          app = Spaceship::ConnectAPI::App.find("john.Boxing-Timer")
          version = app.get_edit_app_store_version(platform: "IOS")
          puts "Version: #{version.version_string} (#{version.id})"

          # Set contentRightsDeclaration on the version
          begin
            version.update(attributes: {
              contentRightsDeclaration: "DOES_NOT_USE_THIRD_PARTY_CONTENT"
            })
            puts "Set contentRightsDeclaration"
          rescue => e
            puts "contentRightsDeclaration warning: #{e.message}"
          end

          # Create review detail if it doesn't exist
          detail = version.fetch_app_store_review_detail
          if detail.nil?
            begin
              Spaceship::ConnectAPI::AppStoreReviewDetail.create(
                app_store_version_id: version.id,
                attributes: {
                  contactFirstName: "Jonathan",
                  contactLastName: "Ulloa",
                  contactPhone: "+1 9152633431",
                  contactEmail: "jonathanulloa08@icloud.com",
                  demoAccountRequired: false
                }
              )
              puts "Created review detail"
            rescue => e
              puts "Review detail warning: #{e.message}"
            end
          else
            puts "Review detail already exists"
          end
          RUBY

      - name: Run Fastlane release
        working-directory: ios
        env:
          ASC_KEY_FILEPATH: ~/asc-keys/AuthKey_3349GWYVGR.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane release
