name: iOS — Deploy to App Store

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - 'ios/**'
      - '.github/workflows/ios-deploy.yml'

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Submit to App Store
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set up Ruby
        uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005 # v1.99.0
        with:
          ruby-version: '3.3'
          bundler: 'latest'
          working-directory: ios

      - name: Install Fastlane
        working-directory: ios
        run: bundle install

      - name: Patch Fastlane compatibility
        working-directory: ios
        run: |
          FASTLANE_DIR=$(bundle exec ruby -e "puts Gem::Specification.find_by_name('fastlane').gem_dir")

          # Fix OpenSSL 3.x "invalid curve name" bug
          TOKEN_RB="$FASTLANE_DIR/spaceship/lib/spaceship/connect_api/token.rb"
          sed -i '' 's/OpenSSL::PKey::EC\.new/OpenSSL::PKey.read/g' "$TOKEN_RB"
          echo "Patched $TOKEN_RB"

          # Fix "No data" crash when fetching review detail on first submission
          # Step 1: patch model.rb so fetch_app_store_review_detail returns nil instead of raising
          MODEL_RB="$FASTLANE_DIR/spaceship/lib/spaceship/connect_api/model.rb"
          ruby -e "
            path = '$MODEL_RB'
            content = File.read(path)
            content.gsub!('raise \"No data\"', 'return nil')
            File.write(path, content)
          "
          echo "Patched $MODEL_RB"

          # Step 2: patch upload_metadata.rb to use safe navigator so nil review detail doesn't crash
          METADATA_RB="$FASTLANE_DIR/deliver/lib/deliver/upload_metadata.rb"
          ruby -e "
            path = '$METADATA_RB'
            content = File.read(path)
            content.gsub!(
              'app_store_review_detail.app_store_review_attachments',
              'app_store_review_detail&.app_store_review_attachments'
            )
            File.write(path, content)
          "
          echo "Patched $METADATA_RB"

      - name: Write App Store Connect API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/asc-keys
          echo "$ASC_API_KEY_CONTENT" | base64 --decode > ~/asc-keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Prepare ASC version for submission
        if: github.ref == 'refs/heads/main'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          REVIEW_CONTACT_FIRST_NAME: ${{ secrets.REVIEW_CONTACT_FIRST_NAME }}
          REVIEW_CONTACT_LAST_NAME: ${{ secrets.REVIEW_CONTACT_LAST_NAME }}
          REVIEW_CONTACT_PHONE: ${{ secrets.REVIEW_CONTACT_PHONE }}
          REVIEW_CONTACT_EMAIL: ${{ secrets.REVIEW_CONTACT_EMAIL }}
        working-directory: ios
        run: |
          bundle exec ruby << 'RUBY'
          require 'spaceship'
          require 'net/http'
          require 'json'
          require 'jwt'

          KEY_ID     = ENV["ASC_KEY_ID"]
          ISSUER_ID  = ENV["ASC_ISSUER_ID"]
          KEY_FILE   = File.join(Dir.home, "asc-keys/AuthKey_#{KEY_ID}.p8")
          BUNDLE_ID  = "john.Boxing-Timer"

          # Auth via Spaceship to find the version
          token = Spaceship::ConnectAPI::Token.create(
            key_id: KEY_ID, issuer_id: ISSUER_ID,
            filepath: KEY_FILE, duration: 1200, in_house: false
          )
          Spaceship::ConnectAPI.token = token

          app     = Spaceship::ConnectAPI::App.find(BUNDLE_ID)
          version = app.get_edit_app_store_version(platform: "IOS")
          vid     = version.id
          puts "Version: #{version.version_string} (#{vid})"

          # Generate a fresh JWT for raw REST calls
          ec_key  = OpenSSL::PKey.read(File.read(KEY_FILE))
          bearer  = JWT.encode(
            { iss: ISSUER_ID, iat: Time.now.to_i, exp: Time.now.to_i + 1200, aud: "appstoreconnect-v1" },
            ec_key, "ES256", { kid: KEY_ID }
          )

          def asc(method, path, body, bearer)
            uri  = URI("https://api.appstoreconnect.apple.com/v1/#{path}")
            http = Net::HTTP.new(uri.host, uri.port)
            http.use_ssl = true
            req  = { "PATCH" => Net::HTTP::Patch, "POST" => Net::HTTP::Post }[method].new(uri)
            req["Authorization"] = "Bearer #{bearer}"
            req["Content-Type"]  = "application/json"
            req.body = body.to_json
            resp = http.request(req)
            puts "#{method} #{path}: HTTP #{resp.code}"
            puts resp.body unless resp.code.to_i.between?(200, 299)
            resp
          end

          # Set contentRightsDeclaration on the app (not the version)
          asc("PATCH", "apps/#{app.id}", {
            data: { type: "apps", id: app.id,
                    attributes: { contentRightsDeclaration: "DOES_NOT_USE_THIRD_PARTY_CONTENT" } }
          }, bearer)

          # Create appStoreReviewDetail if missing
          detail = version.fetch_app_store_review_detail
          if detail.nil?
            asc("POST", "appStoreReviewDetails", {
              data: {
                type: "appStoreReviewDetails",
                attributes: {
                  contactFirstName: ENV["REVIEW_CONTACT_FIRST_NAME"],
                  contactLastName:  ENV["REVIEW_CONTACT_LAST_NAME"],
                  contactPhone:     ENV["REVIEW_CONTACT_PHONE"],
                  contactEmail:     ENV["REVIEW_CONTACT_EMAIL"],
                  demoAccountRequired: false
                },
                relationships: {
                  appStoreVersion: { data: { type: "appStoreVersions", id: vid } }
                }
              }
            }, bearer)
            puts "Created review detail"
          else
            puts "Review detail already exists"
          end
          RUBY

      - name: Run Fastlane release
        if: github.ref == 'refs/heads/main'
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_FILEPATH: ~/asc-keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane release
