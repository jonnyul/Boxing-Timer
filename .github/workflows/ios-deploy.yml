name: iOS — Deploy to App Store

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ios/**'
      - '.github/workflows/ios-deploy.yml'

jobs:
  deploy:
    name: Build & Submit to App Store
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler: 'latest'
          working-directory: ios

      - name: Install Fastlane
        working-directory: ios
        run: bundle install

      - name: Patch Fastlane compatibility
        working-directory: ios
        run: |
          FASTLANE_DIR=$(bundle exec ruby -e "puts Gem::Specification.find_by_name('fastlane').gem_dir")

          # Fix OpenSSL 3.x "invalid curve name" bug
          TOKEN_RB="$FASTLANE_DIR/spaceship/lib/spaceship/connect_api/token.rb"
          sed -i '' 's/OpenSSL::PKey::EC\.new/OpenSSL::PKey.read/g' "$TOKEN_RB"
          echo "Patched $TOKEN_RB"

          # Fix "No data" crash when fetching review detail on first submission
          # Step 1: patch model.rb so fetch_app_store_review_detail returns nil instead of raising
          MODEL_RB="$FASTLANE_DIR/spaceship/lib/spaceship/connect_api/model.rb"
          ruby -e "
            path = '$MODEL_RB'
            content = File.read(path)
            content.gsub!('raise \"No data\"', 'return nil')
            File.write(path, content)
          "
          echo "Patched $MODEL_RB"

          # Step 2: patch upload_metadata.rb to use safe navigator so nil review detail doesn't crash
          METADATA_RB="$FASTLANE_DIR/deliver/lib/deliver/upload_metadata.rb"
          ruby -e "
            path = '$METADATA_RB'
            content = File.read(path)
            content.gsub!(
              'app_store_review_detail.app_store_review_attachments',
              'app_store_review_detail&.app_store_review_attachments'
            )
            File.write(path, content)
          "
          echo "Patched $METADATA_RB"

      - name: Write App Store Connect API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/asc-keys
          echo "$ASC_API_KEY_CONTENT" | base64 --decode > ~/asc-keys/AuthKey_3349GWYVGR.p8

      - name: Run Fastlane release
        working-directory: ios
        env:
          ASC_KEY_FILEPATH: ~/asc-keys/AuthKey_3349GWYVGR.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane release
