name: iOS — Deploy to App Store

on:
  push:
    branches:
      - prod
    paths:
      - 'ios/**'

jobs:
  deploy:
    name: Build & Submit to App Store
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Write App Store Connect API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/asc-keys
          echo "$ASC_API_KEY_CONTENT" > ~/asc-keys/AuthKey_ZV4778F669.p8

      - name: Write Signing Certificate
        env:
          DISTRIBUTION_CERT_BASE64: ${{ secrets.DISTRIBUTION_CERT_BASE64 }}
          DISTRIBUTION_CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
        run: |
          echo "$DISTRIBUTION_CERT_BASE64" | base64 --decode > /tmp/distribution.p12
          security create-keychain -p "" build.keychain
          security import /tmp/distribution.p12 -k build.keychain -P "$DISTRIBUTION_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Write Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/BoxingTimer.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/BoxingTimer.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Run Fastlane release
        working-directory: ios
        env:
          ASC_KEY_FILEPATH: ~/asc-keys/AuthKey_ZV4778F669.p8
        run: fastlane release

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain || true
