name: iOS — Deploy to App Store

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - 'ios/**'
      - '.github/workflows/ios-deploy.yml'

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Submit to App Store
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set up Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: '3.3'
          bundler: 'latest'
          working-directory: ios

      - name: Install Fastlane
        working-directory: ios
        run: bundle install

      - name: Patch Fastlane compatibility
        working-directory: ios
        run: |
          FASTLANE_DIR=$(bundle exec ruby -e "puts Gem::Specification.find_by_name('fastlane').gem_dir")

          # Fix OpenSSL 3.x "invalid curve name" bug
          TOKEN_RB="$FASTLANE_DIR/spaceship/lib/spaceship/connect_api/token.rb"
          sed -i '' 's/OpenSSL::PKey::EC\.new/OpenSSL::PKey.read/g' "$TOKEN_RB"
          echo "Patched $TOKEN_RB"

          # Fix "No data" crash when fetching review detail on first submission
          MODEL_RB="$FASTLANE_DIR/spaceship/lib/spaceship/connect_api/model.rb"
          ruby -e "
            path = '$MODEL_RB'
            content = File.read(path)
            content.gsub!('raise \"No data\"', 'return nil')
            File.write(path, content)
          "
          echo "Patched $MODEL_RB"

          # Use safe navigation so missing review detail does not crash metadata upload
          METADATA_RB="$FASTLANE_DIR/deliver/lib/deliver/upload_metadata.rb"
          ruby -e "
            path = '$METADATA_RB'
            content = File.read(path)
            content.gsub!(
              'app_store_review_detail.app_store_review_attachments',
              'app_store_review_detail&.app_store_review_attachments'
            )
            File.write(path, content)
          "
          echo "Patched $METADATA_RB"

      - name: Write App Store Connect API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/asc-keys
          echo "$ASC_API_KEY_CONTENT" | base64 --decode > ~/asc-keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Prepare ASC version for submission
        if: github.ref == 'refs/heads/main'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          REVIEW_CONTACT_FIRST_NAME: ${{ secrets.REVIEW_CONTACT_FIRST_NAME }}
          REVIEW_CONTACT_LAST_NAME: ${{ secrets.REVIEW_CONTACT_LAST_NAME }}
          REVIEW_CONTACT_PHONE: ${{ secrets.REVIEW_CONTACT_PHONE }}
          REVIEW_CONTACT_EMAIL: ${{ secrets.REVIEW_CONTACT_EMAIL }}
        working-directory: ios
        run: |
          bundle exec ruby << 'RUBY'
          require 'spaceship'
          require 'net/http'
          require 'json'
          require 'jwt'

          KEY_ID     = ENV["ASC_KEY_ID"]
          ISSUER_ID  = ENV["ASC_ISSUER_ID"]
          KEY_FILE   = File.join(Dir.home, "asc-keys/AuthKey_#{KEY_ID}.p8")
          BUNDLE_ID  = "john.Boxing-Timer"
          PROJECT    = File.expand_path("Boxing Timer.xcodeproj/project.pbxproj")
          TARGET_VERSION = File.read(PROJECT)[/MARKETING_VERSION = ([^;]+);/, 1]&.strip

          abort("Could not read MARKETING_VERSION from #{PROJECT}") if TARGET_VERSION.nil? || TARGET_VERSION.empty?

          token = Spaceship::ConnectAPI::Token.create(
            key_id: KEY_ID, issuer_id: ISSUER_ID,
            filepath: KEY_FILE, duration: 1200, in_house: false
          )
          Spaceship::ConnectAPI.token = token

          app     = Spaceship::ConnectAPI::App.find(BUNDLE_ID)
          versions = app.get_app_store_versions(filter: { platform: "IOS" })
          editable_states = %w[PREPARE_FOR_SUBMISSION DEVELOPER_REJECTED REJECTED METADATA_REJECTED INVALID_BINARY]
          version = versions.find { |candidate| candidate.version_string == TARGET_VERSION }
          editable = versions.find { |candidate| editable_states.include?(candidate.app_store_state) }

          if version.nil? && editable
            if editable.version_string != TARGET_VERSION
              editable.update(attributes: { versionString: TARGET_VERSION })
              puts "Updated editable version from #{editable.version_string} to #{TARGET_VERSION}"
            end
          elsif version.nil?
            Spaceship::ConnectAPI.post_app_store_version(
              app_id: app.id,
              attributes: { versionString: TARGET_VERSION, platform: "IOS" }
            )
            puts "Created editable version #{TARGET_VERSION}"
          end

          version = app.get_app_store_versions(filter: { platform: "IOS" }).find { |candidate| candidate.version_string == TARGET_VERSION }
          if version.nil?
            puts "Could not find target version #{TARGET_VERSION} after preparation; skipping ASC pre-submission patch."
            exit 0
          end

          vid     = version.id
          puts "Version: #{version.version_string} (#{version.app_store_state}, #{vid})"

          ec_key = OpenSSL::PKey.read(File.read(KEY_FILE))
          bearer = JWT.encode(
            { iss: ISSUER_ID, iat: Time.now.to_i, exp: Time.now.to_i + 1200, aud: "appstoreconnect-v1" },
            ec_key, "ES256", { kid: KEY_ID }
          )

          def asc(method, path, body, bearer)
            uri = URI("https://api.appstoreconnect.apple.com/v1/#{path}")
            http = Net::HTTP.new(uri.host, uri.port)
            http.use_ssl = true
            req = { "PATCH" => Net::HTTP::Patch, "POST" => Net::HTTP::Post }[method].new(uri)
            req["Authorization"] = "Bearer #{bearer}"
            req["Content-Type"] = "application/json"
            req.body = body.to_json
            resp = http.request(req)
            puts "#{method} #{path}: HTTP #{resp.code}"
            puts resp.body unless resp.code.to_i.between?(200, 299)
            resp
          end

          asc("PATCH", "apps/#{app.id}", {
            data: {
              type: "apps",
              id: app.id,
              attributes: { contentRightsDeclaration: "DOES_NOT_USE_THIRD_PARTY_CONTENT" }
            }
          }, bearer)

          detail = version.fetch_app_store_review_detail
          if detail.nil?
            asc("POST", "appStoreReviewDetails", {
              data: {
                type: "appStoreReviewDetails",
                attributes: {
                  contactFirstName: ENV["REVIEW_CONTACT_FIRST_NAME"],
                  contactLastName: ENV["REVIEW_CONTACT_LAST_NAME"],
                  contactPhone: ENV["REVIEW_CONTACT_PHONE"],
                  contactEmail: ENV["REVIEW_CONTACT_EMAIL"],
                  demoAccountRequired: false
                },
                relationships: {
                  appStoreVersion: { data: { type: "appStoreVersions", id: vid } }
                }
              }
            }, bearer)
            puts "Created review detail"
          else
            puts "Review detail already exists"
          end
          RUBY

      - name: Validate iOS build
        working-directory: ios
        run: |
          xcodebuild \
            -project "Boxing Timer.xcodeproj" \
            -target "Boxing Timer" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify match repo access
        if: github.ref == 'refs/heads/main'
        id: verify_match
        continue-on-error: true
        env:
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          AUTH_HEADER=$(printf '%s' "$MATCH_GIT_BASIC_AUTHORIZATION" | tr -d '\r\n')
          if GIT_CONFIG_GLOBAL=/dev/null GIT_CONFIG_NOSYSTEM=1 \
            git -c credential.helper= \
                -c core.askPass= \
                -c http.extraheader="Authorization: Basic ${AUTH_HEADER}" \
                ls-remote https://github.com/jonnyul/fastlane-match >/dev/null 2>&1; then
            echo "can_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_release=false" >> "$GITHUB_OUTPUT"
            echo "Match repo access failed; skipping App Store submission path."
          fi

      - name: Run Fastlane release
        if: github.ref == 'refs/heads/main'
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_FILEPATH: ~/asc-keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane release
